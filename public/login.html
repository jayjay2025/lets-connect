<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <title>Jags Connect - Login</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f4f7f6;
                display: flex;
                justify-content: center;
                align-items: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .login-container {
                background: white;
                padding: 2.5rem;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.1);
                width: 100%;
                max-width: 400px;
                text-align: center;
            }

            h2 {
                color: #00204b;
                margin-bottom: 0.5rem;
            }

            p {
                color: #666;
                margin-bottom: 1.5rem;
            }

            .input-group {
                text-align: left;
                margin-bottom: 1.2rem;
            }

            label {
                display: block;
                font-weight: 600;
                margin-bottom: 5px;
                color: #333;
            }

            input[type="email"],
            input[type="password"] {
                width: 100%;
                padding: 12px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
            }

            .btn-login {
                width: 100%;
                padding: 12px;
                background-color: #bf0d3e;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 1rem;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.3s ease;
            }

            .btn-login:hover {
                background-color: #900a2e;
            }

            .signup-link {
                margin-top: 1.5rem;
                font-size: 0.9rem;
            }

            .signup-link a {
                color: #bf0d3e;
                text-decoration: none;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="login-page">
            <div class="login-container">
                <form id="loginForm">
                    <h2>Welcome Back, Jags!</h2>
                    <p>Sign in to see the latest club events.</p>

                    <div class="input-group">
                        <label for="email">JagMail Address</label>
                        <input type="email" id="email" placeholder="ab123@jagmail.southalabama.edu" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>

                    <button type="submit" id="loginBtn" class="btn-login">Sign In</button>

                    <p class="signup-link">Don't have an account? <a href="signup.html">Register here</a></p>
                </form> 
            </div>              
        </div>
        <script src="login.js"></script>
    </body>
</html>
